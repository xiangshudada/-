server:
  port: 8091

spring:
  application:
    name: aml-rule-engine-product
  datasource:
    url: jdbc:mysql://localhost:3306/aml_engine?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: rootpwd
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

rule-engine:
  sample-limit: 20
